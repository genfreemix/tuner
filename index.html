<!DOCTYPE html>
<html lang="en" translate="no">
<head>
  <meta charset="UTF-8">
  <meta name="google" content="notranslate">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="theme-color" content="#08070a">
  <meta name="apple-mobile-web-app-title" content="GR-100">
  <title>GR-100 Tuner</title>
  <link rel="manifest" href="manifest.json">
  <link rel="apple-touch-icon" href="assets/icons/apple-touch-icon.png">
  <link rel="icon" type="image/png" sizes="192x192" href="assets/icons/icon-192.png">
  <link rel="preload" href="assets/gr-logo.png" as="image">
  <link rel="stylesheet" href="mobile.css">
</head>
<body>
  <div id="m-root"></div>
  <!-- React 18.3.1 локально (vendor/) — офлайн и без зависимости от CDN -->
  <script src="vendor/react.production.min.js"></script>
  <script src="vendor/react-dom.production.min.js"></script>
  <!-- mobile.js — прекомпилированный mobile.jsx; пересборка: см. README -->
  <script src="mobile.js"></script>
  <script>
    // SW только на сайте: внутри Capacitor-приложения (https://localhost)
    // контент локальный, service worker не нужен
    if ('serviceWorker' in navigator && location.hostname !== 'localhost') {
      window.addEventListener('load', function () {
        navigator.serviceWorker.register('sw.js');
      });
    }
  </script>
</body>
</html>
