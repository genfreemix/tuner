# Сборка подписанного Android APK/AAB в облаке.
# Ключ и пароли — в секретах репозитория (Settings → Secrets → Actions).
name: Build Android

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    # собираем только в основном репо (в зеркале genfreemix.github.io не нужно)
    if: github.repository == 'genfreemix/tuner'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21

      - name: Install deps and build web assets
        run: |
          npm ci
          npm run build:www
          npx cap sync android

      - name: Decode signing keystore
        env:
          KEYSTORE_BASE64: ${{ secrets.KEYSTORE_BASE64 }}
        run: echo "$KEYSTORE_BASE64" | base64 -d > android/signing.keystore

      - name: Build signed release APK + AAB
        working-directory: android
        env:
          KEYSTORE_FILE: ${{ github.workspace }}/android/signing.keystore
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
        run: |
          chmod +x gradlew
          ./gradlew assembleRelease bundleRelease

      - uses: actions/upload-artifact@v4
        with:
          name: GR-100-Tuner-Android
          path: |
            android/app/build/outputs/apk/release/app-release.apk
            android/app/build/outputs/bundle/release/app-release.aab
